<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora AI - Premium Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEBHOOK_URL = 'https://sujan18.app.n8n.cloud/webhook/99eab1a0-569d-4f0f-a49e-578a02abfe63/webhook';
        const APP_NAME = "Velora AI";

        // Simple SVG Icon Components
        const Icons = {
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Bot: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            AlertCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const savedSession = localStorage.getItem('velora_session');
                const savedMessages = localStorage.getItem('velora_messages');
                if (savedSession) setIsLoggedIn(true);
                if (savedMessages) setMessages(JSON.parse(savedMessages));
            }, []);

            useEffect(() => {
                if (messages.length > 0) {
                    localStorage.setItem('velora_messages', JSON.stringify(messages));
                }
            }, [messages]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isLoading]);

            const handleLogin = (e) => {
                e.preventDefault();
                setIsLoggedIn(true);
                localStorage.setItem('velora_session', 'active');
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                localStorage.removeItem('velora_session');
            };

            const sendMessage = async (e) => {
                if (e) e.preventDefault();
                if (!inputValue.trim() || isLoading) return;

                const userText = inputValue.trim();
                const userMessage = {
                    id: Date.now(),
                    role: 'user',
                    text: userText,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                setMessages(prev => [...prev, userMessage]);
                setInputValue('');
                setIsLoading(true);
                setError(null);

                try {
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userText }),
                    });

                    if (!response.ok) throw new Error('Network response was not ok');

                    const data = await response.json();
                    const aiMessage = {
                        id: Date.now() + 1,
                        role: 'assistant',
                        text: data.response || (Array.isArray(data) ? data[0]?.output : null) || "Received, but no text response generated.",
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };

                    setMessages(prev => [...prev, aiMessage]);
                } catch (err) {
                    setError("Connection failure. Ensure your n8n production webhook is active.");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen text-slate-200 flex items-center justify-center p-6 selection:bg-indigo-500/30">
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
                            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-500/10 blur-[120px] rounded-full" />
                            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 blur-[120px] rounded-full" />
                        </div>
                        <div className="w-full max-w-md relative z-10">
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-12 h-12 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-xl flex items-center justify-center shadow-lg mb-4">
                                    <Icons.Zap />
                                </div>
                                <h1 className="text-3xl font-bold tracking-tight text-white">{APP_NAME}</h1>
                                <p className="text-slate-400 mt-2">Secure Personal Intelligence Gateway</p>
                            </div>
                            <form onSubmit={handleLogin} className="bg-[#1a1d24]/80 backdrop-blur-xl border border-white/5 p-8 rounded-2xl shadow-2xl">
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5 ml-1">Identity</label>
                                        <input type="email" required className="w-full bg-[#0f1115] border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 text-white" placeholder="name@company.com" value={loginData.email} onChange={(e) => setLoginData({...loginData, email: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5 ml-1">Access Key</label>
                                        <input type="password" required className="w-full bg-[#0f1115] border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 text-white" placeholder="••••••••" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                    </div>
                                </div>
                                <button type="submit" className="w-full mt-8 bg-white text-black font-semibold py-3 rounded-lg hover:bg-slate-200 transition-all flex items-center justify-center gap-2 group">
                                    Sign In <Icons.ChevronRight />
                                </button>
                                <button type="button" onClick={() => setIsLoggedIn(true)} className="w-full mt-3 text-slate-400 text-sm hover:text-white transition-colors py-2">Continue as Guest</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-[#0f1115] text-slate-200 selection:bg-indigo-500/30">
                    <header className="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-[#0f1115]/50 backdrop-blur-md z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-lg flex items-center justify-center">
                                <Icons.Zap />
                            </div>
                            <span className="font-bold tracking-tight text-white hidden sm:block">{APP_NAME}</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden sm:flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse" />
                                <span className="text-[10px] uppercase tracking-widest text-emerald-500 font-bold">Assistant Online</span>
                            </div>
                            <button onClick={handleLogout} className="text-slate-400 hover:text-white p-2 rounded-lg hover:bg-white/5"><Icons.LogOut /></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto scrollbar-hide">
                        <div className="max-w-3xl mx-auto px-4 py-8">
                            {messages.length === 0 && (
                                <div className="h-[60vh] flex flex-col items-center justify-center text-center">
                                    <div className="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mb-6 text-indigo-400">
                                        <Icons.Bot />
                                    </div>
                                    <h2 className="text-2xl font-semibold text-white mb-2">Welcome</h2>
                                    <p className="text-slate-400 max-w-sm">How can Velora assist you today?</p>
                                </div>
                            )}
                            <div className="space-y-8">
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`flex gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                        <div className={`mt-1 flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center ${msg.role === 'user' ? 'bg-indigo-600' : 'bg-[#1a1d24] border border-white/10'}`}>
                                            {msg.role === 'user' ? <Icons.User /> : <Icons.Bot />}
                                        </div>
                                        <div className={`flex flex-col max-w-[85%] ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                            <div className={`px-4 py-3 rounded-2xl text-[15px] ${msg.role === 'user' ? 'bg-white text-black font-medium' : 'bg-[#1a1d24] text-slate-200 border border-white/5'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-widest font-bold">{msg.timestamp}</span>
                                        </div>
                                    </div>
                                ))}
                                {isLoading && <div className="flex gap-4"><div className="w-8 h-8 bg-[#1a1d24] rounded-lg flex items-center justify-center"><Icons.Bot /></div><div className="bg-[#1a1d24] px-4 py-3 rounded-2xl animate-pulse">...</div></div>}
                                {error && <div className="flex justify-center text-red-400 text-sm gap-2"><Icons.AlertCircle /> {error}</div>}
                                <div ref={messagesEndRef} />
                            </div>
                        </div>
                    </main>

                    <footer className="p-4 sm:p-6">
                        <div className="max-w-3xl mx-auto">
                            <form onSubmit={sendMessage} className="relative bg-[#1a1d24] border border-white/10 rounded-2xl overflow-hidden focus-within:border-indigo-500/50 transition-all">
                                <textarea rows="1" value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyDown={handleKeyDown} placeholder="Message Velora..." className="w-full bg-transparent px-5 py-4 pr-14 text-white placeholder-slate-500 focus:ring-0 resize-none outline-none" />
                                <div className="absolute right-3 bottom-3">
                                    <button type="submit" disabled={!inputValue.trim() || isLoading} className={`p-2 rounded-xl ${inputValue.trim() && !isLoading ? 'bg-white text-black' : 'bg-white/5 text-slate-600'}`}>
                                        <Icons.Send />
                                    </button>
                                </div>
                            </form>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
